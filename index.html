<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sakura Café</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="menu-container">
        <h1>Sakura Café</h1>
        
        <h2>Menu</h2>

        <!-- Menu list populated by JavaScript -->
        <ul id="menu-list"></ul>

        <!-- Daily Special Feature -->
        <button id="show-special">Show Daily Special</button>
        <p id="daily-special"></p>
        <h2>Frequently Asked Questions</h2>

<div class="faq-item">
  <button class="faq-question">Do you have dairy-free options?</button>
  <div class="faq-answer">Yes! We offer oat, almond, and soy milk for all drinks.</div>
</div>

<div class="faq-item">
  <button class="faq-question">Can I order ahead?</button>
  <div class="faq-answer">Yes, you can call ahead or order online for quick pickup!</div>
</div>

<div class="faq-item">
  <button class="faq-question">What are your hours?</button>
  <div class="faq-answer">We’re open daily from 6am – 3pm.</div>
</div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
